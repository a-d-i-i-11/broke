<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Money Control</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js" defer></script>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<h1>💸 MONEY CONTROL</h1>

<a href="#">🏠 Dashboard</a>
<a href="#" onclick="showReport()">📊 Reports</a>
<a href="index.html">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<h1 class="title">Dashboard</h1>

<!-- TOP CARDS -->
<div class="top-cards">

<div class="top-card">
<p>Total Income</p>
<h2 id="inc">₹0</h2>
</div>

<div class="top-card active">
<p>Total Expense</p>
<h2 id="exp">₹0</h2>
</div>

<div class="top-card">
<p>Balance</p>
<h2 id="bal">₹0</h2>
</div>

</div>

<!-- GRID -->
<div class="modern-grid">

<!-- FORM -->
<div class="card">
<h3>Add Transaction</h3>

<input id="desc" placeholder="Description">
<input id="amt" type="number" placeholder="Amount">
<input id="date" type="date">

<select id="cat">
<option>Food</option>
<option>Salary</option>
<option>Travel</option>
<option>Shopping</option>
<option>Personal Exp</option>
<option>Pocket Money</option>
<option>Business Income</option>
</select>

<button class="btn full" onclick="add()">Add Transaction</button>
</div>

<!-- CHART + TARGET -->
<div class="card">
<h3>Overview</h3>

<input id="targetName" placeholder="Target (Bike, House...)">
<input id="target" type="number" placeholder="Target Amount ₹">

<button class="btn" onclick="setTarget()">Set Target</button>

<p id="targetDisplay"></p>

<canvas id="chart" style="margin-top:20px;"></canvas>
</div>

</div>

<!-- HISTORY -->
<div class="card" style="margin-top:30px;">
<h3>Recent Transactions</h3>

<table class="history-table">
<thead>
<tr>
<th>Description</th>
<th>Category</th>
<th>Amount</th>
<th>Date</th>
<th>Type</th>
</tr>
</thead>

<tbody id="history"></tbody>
</table>
</div>

<!-- REPORTS -->
<div class="card report-section" style="margin-top:30px;">
<h3>📊 Reports & Analysis</h3>

<canvas id="monthlyChart"></canvas>
<canvas id="dailyChart" style="margin-top:30px;"></canvas>
<canvas id="incomeExpenseChart" style="margin-top:30px;"></canvas>

</div>

</div>
</div>

</body>
</html>
