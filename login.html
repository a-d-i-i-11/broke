<!DOCTYPE html>
<html>
<head>
<title>Login - Money Control</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container">

  <!-- LOGIN BOX -->
  <div class="auth-box" id="loginBox">
    <h2>Welcome Back</h2>
    <p class="auth-sub">Login to continue</p>

    <input type="text" placeholder="Email">
    <input type="password" placeholder="Password">

    <!-- ✅ FIXED BUTTON -->
    <button class="btn full" onclick="login()">Continue</button>

    <p class="switch">
      Don't have an account? 
      <span onclick="showSignup()">Sign up</span>
    </p>
  </div>

  <!-- SIGNUP BOX -->
  <div class="auth-box hidden" id="signupBox">
    <h2>Create Account</h2>
    <p class="auth-sub">Start your journey</p>

    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Email">
    <input type="password" placeholder="Password">

    <!-- ✅ SAME BUTTON -->
    <button class="btn full" onclick="login()">Continue</button>

    <p class="switch">
      Already have an account? 
      <span onclick="showLogin()">Login</span>
    </p>
  </div>

</div>

<!-- ✅ CLEAN SCRIPT (ONLY ONE) -->
<script>
function showSignup(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("signupBox").classList.remove("hidden");
}

function showLogin(){
  document.getElementById("signupBox").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
}

/* 🔥 LOGIN REDIRECT */
function login(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
